Section "ServerLayout"
    Identifier "dummy"
    Screen "screen0"
EndSection


Section "Device"
    Identifier "dummy_device"
    Driver "dummy"
    VideoRam 256000
EndSection


Section "Monitor"
    Identifier "monitor0"
    HorizSync 28.0-80.0
    VertRefresh 48.0-75.0
    Modeline "1280x720" 74.50 1280 1344 1472 1664 720 723 728 748 +HSync +VSync
EndSection


Section "Screen"
    Identifier "screen0"
    Device "dummy_device"
    Monitor "monitor0"
    DefaultDepth 24
    SubSection "Display"
        Depth 24
        Modes "1280x720"
    EndSubSection
EndSection
